<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#0d1117"/>

  <!-- Hexagon — "Poly" (six-sided polygon) -->
  <polygon
    points="16,2.5 27.3,8.75 27.3,21.25 16,27.5 4.7,21.25 4.7,8.75"
    fill="rgba(88,166,255,0.10)"
    stroke="#58a6ff"
    stroke-width="1.8"
    stroke-linejoin="round"
  />

  <!-- Upward trend line — "Champ" (winning edge) -->
  <polyline
    points="7.5,22 11.5,17 16,19.5 22.5,11"
    stroke="#3fb950"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Peak dot — the champion moment -->
  <circle cx="22.5" cy="11" r="2.2" fill="#3fb950"/>
</svg>
